elements:
- button
- details
- embed
- iframe
- label
- select
- textarea
elements_maybe:
- a
- audio
- img
- input
- video
exceptions: a (if the href attribute is present); audio (if the controls attribute is present); img (if the usemap or controls attribute is present); input (if the type attribute is not in the Hidden state); video (if the controls attribute is present)
